name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Build-time NEXT_PUBLIC_* placeholders — real values are
          # injected at image build time in deploy.yml. CI just needs
          # *something* present so the build doesn't crash on undefined.
          # The ship-to-vps renderer expands this block from Infisical.
          {{public_build_placeholders_yaml}}
        run: npm run build
