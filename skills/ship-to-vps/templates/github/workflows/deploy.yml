name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: meta
        run: |
          IMAGE_LC="$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_lc=${IMAGE_LC}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_LC}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_lc }}:latest
            ${{ steps.meta.outputs.image_lc }}:${{ github.sha }}
            ${{ steps.meta.outputs.image_lc }}:sha-${{ github.sha }}
          build-args: |
            {{public_build_args_yaml}}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Roll VPS container
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          IMAGE_LC: ghcr.io/${{ github.repository }}
          IMAGE_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE_LC_LOWER="$(echo "${IMAGE_LC}" | tr '[:upper:]' '[:lower:]')"
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash -se <<EOF
          set -euo pipefail
          cd /opt/{{slug}}

          # Login to GHCR (idempotent)
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

          # Pin compose to this exact SHA
          export WEB_IMAGE="${IMAGE_LC_LOWER}:${IMAGE_SHA}"
          echo "[deploy] pulling \${WEB_IMAGE}"
          docker pull "\${WEB_IMAGE}"

          # Run migrations using the new image (one-shot container).
          # Invoke prisma via node directly — runner image ships
          # node_modules/prisma/ but the .bin/ shims aren't on PATH.
          echo "[deploy] running prisma migrate deploy"
          docker run --rm \\
            --network {{slug}} \\
            --env-file /opt/{{slug}}/.env \\
            "\${WEB_IMAGE}" \\
            node node_modules/prisma/build/index.js migrate deploy

          # Roll the web container
          echo "[deploy] rolling web container"
          docker compose up -d --no-deps --pull always web

          # Verify
          sleep 5
          docker compose ps
          docker logs --tail=30 {{slug}}-web

          docker image prune -f --filter "until=72h" || true
          EOF

      - name: Smoke test
        run: |
          set -e
          for i in 1 2 3 4 5; do
            if curl -sf -o /dev/null -w "%{http_code}" "https://{{domain}}/" | grep -q "200"; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
